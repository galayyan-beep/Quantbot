name: Quantbot Paper Trading

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: quantbot
  cancel-in-progress: true    # kill old run when new one starts

permissions:
  contents: write
  issues: write

jobs:
  run-bot:
    name: Quantbot Paper Trading
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Quantbot (paper trading)
        run: |
          timeout 20400 node index.js
          echo "Bot exited normally"
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CAPITAL_API_KEY:   ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_API_SECRET: ${{ secrets.CAPITAL_API_SECRET }}
          CAPITAL_IDENTIFIER: ${{ secrets.CAPITAL_IDENTIFIER }}
          CAPITAL_ACCOUNT_ID: ${{ secrets.CAPITAL_ACCOUNT_ID }}
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
          LIVE_TRADING:      'false'
          NODE_ENV:          production

      - name: Commit trading state
        if: always()
        run: |
          git config user.name  "Quantbot[bot]"
          git config user.email "quantbot@users.noreply.github.com"
          git add data/ || true
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore(data): trading state update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push || echo "Push failed — possible conflict"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
