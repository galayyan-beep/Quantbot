name: Quantbot — Always Running

on:
  # Staggered schedule: runs every 5 hours so sessions overlap with the 5h48m runtime.
  # This ensures the bot is ALWAYS live with zero gaps.
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: quantbot-live
  cancel-in-progress: false   # don't kill a running session when a new one starts — let it finish

permissions:
  contents: write
  issues: write

jobs:
  run-bot:
    name: Quantbot LIVE (continuous)
    runs-on: ubuntu-latest
    timeout-minutes: 355       # just under 6h GitHub max

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Run for 5h 48m — leaves 7 min buffer for commit + next session startup
      - name: Run Quantbot
        run: timeout 20880 node index.js || true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL:   ${{ secrets.ANTHROPIC_MODEL || 'claude-3-5-sonnet-20241022' }}
          CAPITAL_API_KEY:   ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_API_SECRET: ${{ secrets.CAPITAL_API_SECRET }}
          CAPITAL_IDENTIFIER: ${{ secrets.CAPITAL_IDENTIFIER }}
          CAPITAL_ACCOUNT_ID: ${{ secrets.CAPITAL_ACCOUNT_ID }}
          CAPITAL_TARGET_AVAILABLE_BALANCE: '100'
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
          LIVE_TRADING:      'false'
          PAPER_TRADING:     'true'
          NODE_ENV:          production

      - name: Commit trading state
        run: |
          git config user.name  "Quantbot[bot]"
          git config user.email "quantbot@users.noreply.github.com"
          git add data/ || true
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore(data): trading state update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  daily-digest:
    name: Post Daily P&L Digest
    runs-on: ubuntu-latest
    needs: []
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Generate and post daily digest
        run: node scripts/post-summary.js
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CAPITAL_API_KEY:   ${{ secrets.CAPITAL_API_KEY }}
          CAPITAL_API_SECRET: ${{ secrets.CAPITAL_API_SECRET }}
          CAPITAL_IDENTIFIER: ${{ secrets.CAPITAL_IDENTIFIER }}
          NEWS_API_KEY:      ${{ secrets.NEWS_API_KEY }}
